# Tag-triggered Windows release build for GameSaver.
#
# Usage:
#   git tag v0.2.0
#   git push --tags
#
# CI then builds a portable .zip + checksums.txt and attaches both to a new
# GitHub Release (notes auto-generated from commits since the previous tag).
#
# The version string is baked into the binary via ldflags, so the self-updater
# inside the app can compare it against future releases.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows .zip
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build (production, version-stamped, key-injected)
        shell: pwsh
        env:
          CGO_ENABLED: '1'
          STEAMGRIDDB_KEY: ${{ secrets.STEAMGRIDDB_KEY }}
        run: |
          $tag = "${{ github.ref_name }}"
          Write-Host "Building $tag"
          # Build -X ldflags: version + (optional) SteamGridDB key from repo secret.
          # The key never lives in source; if the secret isn't set, the binary
          # ships with an empty default and falls back to per-user Settings input.
          $ld = "-X main.AppVersion=$tag"
          if ($env:STEAMGRIDDB_KEY) {
            $ld += " -X 'GameSaver/internal/meta.DefaultSteamGridDBKey=$env:STEAMGRIDDB_KEY'"
            Write-Host "Embedded SteamGridDB key from repository secret"
          } else {
            Write-Host "STEAMGRIDDB_KEY secret is empty — binary will require per-user Settings input"
          }
          wails build -trimpath -ldflags $ld
          if (!(Test-Path build/bin/GameSaver.exe)) {
            throw "GameSaver.exe was not produced"
          }
          $size = (Get-Item build/bin/GameSaver.exe).Length
          Write-Host ("Built {0:N1} MB" -f ($size/1MB))

      - name: Build watchdog (separate small exe for shell-mode users)
        shell: pwsh
        env:
          CGO_ENABLED: '0'
        run: |
          $tag = "${{ github.ref_name }}"
          # Pure-Go build (no cgo) so the watchdog stays tiny (~2 MB stripped).
          # -H windowsgui suppresses the console window that pops up otherwise
          # — important since the watchdog runs as the user's shell at logon.
          go build -trimpath `
            -ldflags "-s -w -H windowsgui -X main.Version=$tag" `
            -o gamesaver-watchdog-windows-amd64.exe `
            ./cmd/gamesaver-watchdog
          $size = (Get-Item gamesaver-watchdog-windows-amd64.exe).Length
          Write-Host ("Watchdog: {0:N1} MB" -f ($size/1MB))

      - name: Package portable .zip + checksums
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "GameSaver-$tag-windows-amd64.zip"
          $watchdog = "gamesaver-watchdog-windows-amd64.exe"
          Compress-Archive -Path build/bin/GameSaver.exe -DestinationPath $zipName -Force
          $zipSha = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLower()
          $exeSha = (Get-FileHash build/bin/GameSaver.exe -Algorithm SHA256).Hash.ToLower()
          $wdSha  = (Get-FileHash $watchdog -Algorithm SHA256).Hash.ToLower()
          @(
            "$zipSha  $zipName",
            "$exeSha  GameSaver.exe",
            "$wdSha  $watchdog"
          ) | Set-Content -Encoding ASCII -NoNewline -Path checksums.txt
          "Built artefacts:" | Write-Host
          Get-ChildItem GameSaver-*.zip, gamesaver-watchdog-*.exe, checksums.txt | Select-Object Name, Length

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GameSaver ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            GameSaver-*-windows-amd64.zip
            gamesaver-watchdog-windows-amd64.exe
            checksums.txt
